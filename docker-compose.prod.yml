# ═══════════════════════════════════════════════════════════════════════════════
# AMAN ERP — docker-compose.prod.yml (Production overrides)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── In production: close direct access to DB & Redis ports ──────────────────
  db:
    ports: []                        # No external exposure
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    ports: []                        # No external exposure
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    ports: []                        # Exposed through nginx reverse proxy only
    environment:
      APP_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
    command: >
      gunicorn main:app
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-2}
      --worker-class uvicorn.workers.UvicornWorker
      --timeout 120
      --graceful-timeout 30
      --keep-alive 5
      --access-logfile -
      --error-logfile -
      --log-level info
    deploy:
      # replicas requires removing container_name — use 1 on single-node
      resources:
        limits:
          memory: 512m
      restart_policy:
        condition: on-failure
        max_attempts: 3

  frontend:
    deploy:
      resources:
        limits:
          memory: 128m

  # ── Prometheus: no external port in production ───────────────────────────────
  prometheus:
    ports: []

  # ── Grafana: internal only (accessed through a secure tunnel or VPN) ─────────
  grafana:
    ports: []
    environment:
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
