# ═══════════════════════════════════════════════════════════════════════════════
# AMAN ERP — Production Nginx Configuration
# OPS-005: SSL/TLS termination, rate limiting, security headers
#
# Place this file at: /etc/nginx/sites-available/aman-erp
# Symlink: ln -s /etc/nginx/sites-available/aman-erp /etc/nginx/sites-enabled/
#
# SSL setup (Let's Encrypt):
#   certbot certonly --nginx -d erp.yourdomain.com
# ═══════════════════════════════════════════════════════════════════════════════

# ── Rate limiting zones ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream aman_backend {
    least_conn;
    server 127.0.0.1:8000;
    # If running multiple backend replicas:
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name erp.yourdomain.com;   # ← CHANGE THIS

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.yourdomain.com;   # ← CHANGE THIS

    # ── SSL Certificates (Let's Encrypt) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/erp.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.yourdomain.com/privkey.pem;

    # ── SSL Parameters (Mozilla Modern) ──────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss://$host" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── General Settings ──────────────────────────────────────────────────────
    client_max_body_size 50m;
    limit_conn conn_limit 20;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Frontend (React SPA) ─────────────────────────────────────────────────
    root /var/www/aman/frontend;
    index index.html;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Always fetch latest app shell so it references fresh hashed assets
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Build SHA probe for CI deploy verification
    location = /build-sha.txt {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        default_type text/plain;
        try_files $uri =404;
    }

    # ── API Proxy ────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://aman_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    90s;
        proxy_send_timeout    60s;
        proxy_buffering off;
    }

    # ── Login endpoint — strict rate limit ───────────────────────────────────
    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://aman_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
    }

    # ── WebSocket (notifications) ────────────────────────────────────────────
    location /api/ws/ {
        proxy_pass http://aman_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── Prometheus metrics — internal only ───────────────────────────────────
    location /metrics {
        # Only allow internal/monitoring access
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://aman_backend/metrics;
    }

    # ── Uploads (user files, logos) ──────────────────────────────────────────
    location /uploads/ {
        alias /var/www/aman/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Health check probe ───────────────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://aman_backend/health;
    }

    # ── Block access to hidden files ─────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── SPA Fallback ─────────────────────────────────────────────────────────
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }
}
