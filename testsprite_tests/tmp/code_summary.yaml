version: "2"
type: backend
tech_stack:
  - Python
  - FastAPI
  - PostgreSQL
  - SQLAlchemy
  - JWT
  - Redis
  - React
  - Vite
features:
  - name: Authentication & Session Management
    description: User login, JWT handling, and security-related session flows.
    files:
      - backend/routers/auth.py
      - backend/main.py
      - backend/utils/security_middleware.py
    endpoints:
      - method: POST
        path: /api/auth/login
        description: Authenticate user credentials and issue access token.
        auth_required: false
      - method: POST
        path: /api/auth/2fa/verify
        description: Verify two-factor authentication code.
        auth_required: true
    depends_on:
      - Company and user records in PostgreSQL
      - JWT secret configuration
  - name: Company & Access Control
    description: Manage companies, roles, and permission boundaries.
    files:
      - backend/routers/companies.py
      - backend/routers/roles.py
      - backend/routers/role_dashboards.py
      - backend/utils/permissions.py
    endpoints:
      - method: GET
        path: /api/companies
        description: List accessible companies.
        auth_required: true
      - method: POST
        path: /api/roles
        description: Create a role with permissions.
        auth_required: true
    depends_on:
      - Authenticated user context
      - Permission decorators and role policy checks
  - name: Finance Operations
    description: Financial modules including accounting, treasury, taxes, and budgeting APIs.
    files:
      - backend/routers/finance/accounting.py
      - backend/routers/finance/treasury.py
      - backend/routers/finance/taxes.py
      - backend/routers/finance/budgets.py
    endpoints:
      - method: GET
        path: /api/finance/accounting/entries
        description: Retrieve journal entries and accounting records.
        auth_required: true
      - method: POST
        path: /api/finance/treasury/transactions
        description: Create treasury transaction records.
        auth_required: true
    depends_on:
      - Multi-tenant database schemas
      - Accounting chart setup and currency data
  - name: Sales, Purchases, and Inventory
    description: Core ERP operational flows across sales, purchasing, and stock management.
    files:
      - backend/routers/sales
      - backend/routers/purchases.py
      - backend/routers/inventory
      - backend/routers/pos.py
    endpoints:
      - method: GET
        path: /api/sales/orders
        description: List sales orders.
        auth_required: true
      - method: POST
        path: /api/purchases/orders
        description: Create purchase orders.
        auth_required: true
    depends_on:
      - Product, warehouse, and party master data
      - Branch and company context
  - name: Frontend SPA Modules
    description: React single-page app for ERP modules, dashboards, and forms.
    files:
      - frontend/src
      - frontend/src/main.jsx
      - frontend/src/App.jsx
    endpoints:
      - method: GET
        path: /
        description: Serve the ERP frontend application shell.
        auth_required: false
      - method: GET
        path: /api/docs
        description: Access backend Swagger docs used by developers and QA.
        auth_required: false
    depends_on:
      - Backend API availability on port 8000
      - Frontend build/runtime via Vite
known_limitations:
  - issue: Root repository README is missing, reducing discoverability of canonical startup/testing guidance.
    location: /home/omar/Desktop/aman/
    impact: Onboarding and test automation setup can be slower or inconsistent.
  - issue: API route inventory is broad and distributed across many router files, making complete endpoint coverage difficult without generated OpenAPI inspection.
    location: backend/routers/
    impact: Automated test plans may miss less-used module paths unless explicitly targeted.
