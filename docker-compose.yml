# ═══════════════════════════════════════════════════════════════════════════════
# AMAN ERP — docker-compose.yml (Development / Staging)
#
# Services:
#   backend    FastAPI app (port 8000)
#   frontend   Nginx + React SPA (port 80)
#   db         PostgreSQL 15 (port 5432)
#   redis      Redis 7 (port 6379)
#   prometheus Metrics scraper (port 9090)
#   grafana    Metrics dashboard (port 3000)
#
# Quick start:
#   cp backend/.env.example backend/.env   # fill in secrets
#   docker compose up -d
#   open http://localhost
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: aman_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/db_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"   # Bind to localhost only (not exposed externally)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aman}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aman_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aman_redis
    restart: unless-stopped
    # SEC-M: require a password even in dev so habit doesn't leak to staging.
    # REDIS_PASSWORD defaults to 'dev_aman_redis' if not set in .env.
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "${REDIS_PASSWORD:-dev_aman_redis}"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"   # Bind to localhost only
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_aman_redis}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aman_net

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aman_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      POSTGRES_SERVER: db
      REDIS_URL: redis://:${REDIS_PASSWORD:-dev_aman_redis}@redis:6379/0
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    networks:
      - aman_net

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: aman_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aman_net

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aman_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - aman_net

  # ── PostgreSQL Exporter (for Prometheus) ────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: aman_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@db:5432/postgres?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aman_net

  # ── Redis Exporter (for Prometheus) ─────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: aman_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aman_net

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: aman_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - aman_net

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  db_data:
  redis_data:
  uploads:
  prometheus_data:
  grafana_data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  aman_net:
    driver: bridge
