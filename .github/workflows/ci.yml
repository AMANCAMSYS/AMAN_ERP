name: AMAN ERP CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/aman

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  # 0. Secret Scan Gate
  # ══════════════════════════════════════════════════════════════════════════════
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════════════════════
  # 1. Backend Tests
  # ══════════════════════════════════════════════════════════════════════════════
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-22.04
    needs: [secret-scan]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aman_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aman_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Syntax check (all Python files)
        working-directory: backend
        run: |
          python -c "
          import ast, sys, pathlib
          errors = []
          for f in pathlib.Path('.').rglob('*.py'):
              if '__pycache__' in str(f) or '.venv' in str(f):
                  continue
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('❌ Syntax errors:')
              for e in errors: print(f'  {e}')
              sys.exit(1)
          print('✅ All Python files pass syntax check')
          "

      - name: Run Backend Tests
        working-directory: backend
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aman_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aman_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          APP_ENV: testing
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --junitxml=test-results/backend.xml \
            -q 2>&1 | head -200 || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results/

  # ══════════════════════════════════════════════════════════════════════════════
  # 2. Frontend Tests / Build
  # ══════════════════════════════════════════════════════════════════════════════
  frontend-tests:
    name: Frontend Tests (Node)
    runs-on: ubuntu-22.04
    needs: [secret-scan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════════
  # 3. Docker Image Build (only on push to main/develop)
  # ══════════════════════════════════════════════════════════════════════════════
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-22.04
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════════════════
  # 4. Deploy to Production (main branch only)
  #    Strategy: SSH → git pull → docker compose up --build
  # ══════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy to Production (DigitalOcean)
    runs-on: ubuntu-22.04
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.backend-tests.result == 'success' && needs.frontend-tests.result == 'success'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            echo "🚀 Starting deployment — $(date)"
            cd /opt/aman

            # 0. Self-heal broken git ownership/locks (common after manual root operations)
            if [ -f .git/index.lock ] || [ -f .git/packed-refs.lock ] || [ -f .git/shallow.lock ]; then
              echo "⚠️ Removing stale git lock files"
              rm -f .git/index.lock .git/packed-refs.lock .git/shallow.lock || true
            fi

            if [ ! -w .git ] || [ ! -w .git/objects ]; then
              echo "⚠️ Repository permissions are not writable for deploy user; attempting repair"
              if command -v sudo >/dev/null 2>&1; then
                sudo -n chown -R "$(id -u):$(id -g)" /opt/aman/.git || {
                  echo "⚠️ Failed to repair /opt/aman/.git ownership with sudo"
                  ls -ld .git .git/objects || true
                }
              else
                chown -R "$(id -u):$(id -g)" /opt/aman/.git || {
                  echo "⚠️ Failed to repair /opt/aman/.git ownership"
                  ls -ld .git .git/objects || true
                }
              fi
            fi

            # 1. Pull latest code
            TRIGGER_SHA='${{ github.sha }}'
            EXPECTED_SHA=""
            if git fetch --prune origin main; then
              REMOTE_MAIN_SHA=$(git rev-parse origin/main)
              if [ "$REMOTE_MAIN_SHA" != "$TRIGGER_SHA" ]; then
                echo "❌ origin/main SHA does not match triggering commit"
                echo "   trigger: $TRIGGER_SHA"
                echo "   origin:  $REMOTE_MAIN_SHA"
                exit 1
              fi
              git reset --hard "$REMOTE_MAIN_SHA"
              EXPECTED_SHA=$(git rev-parse HEAD)
              echo "✅ Code updated to: $(git log -1 --oneline)"
            else
              echo "⚠️ git fetch failed in /opt/aman; falling back to fresh clone sync"
              ORIGIN_URL=$(git config --get remote.origin.url || true)
              if [ -z "$ORIGIN_URL" ]; then
                echo "❌ Cannot determine origin URL for fallback clone"
                exit 1
              fi

              # Try to ensure deployment user can write project files before rsync fallback
              if command -v sudo >/dev/null 2>&1; then
                sudo -n chown -R "$(id -u):$(id -g)" /opt/aman || true
              fi

              TMP_REPO=$(mktemp -d)
              git clone --depth=1 --branch main "$ORIGIN_URL" "$TMP_REPO"
              REMOTE_MAIN_SHA=$(git -C "$TMP_REPO" rev-parse HEAD)
              if [ "$REMOTE_MAIN_SHA" != "$TRIGGER_SHA" ]; then
                echo "❌ fallback clone SHA does not match triggering commit"
                echo "   trigger: $TRIGGER_SHA"
                echo "   clone:   $REMOTE_MAIN_SHA"
                exit 1
              fi

              rsync -rltD --omit-dir-times --no-perms --no-owner --no-group \
                --exclude '.git' \
                --exclude 'backend/.env' \
                --exclude '.env' \
                --exclude 'backend/uploads/' \
                --exclude 'uploads/' \
                --exclude 'backups/' \
                "$TMP_REPO/" /opt/aman/
              rm -rf "$TMP_REPO"
              cd /opt/aman
              EXPECTED_SHA="$TRIGGER_SHA"
              echo "✅ Fallback clone sync complete: $EXPECTED_SHA"
            fi

            # 2. Write backend .env from GitHub secret
            printf '%s' '${{ secrets.PROD_ENV_FILE }}' > backend/.env
            chmod 600 backend/.env

            # 3. Write root .env for docker compose variable interpolation
            grep -E '^(POSTGRES_PASSWORD|POSTGRES_USER|POSTGRES_DB|REDIS_PASSWORD|GRAFANA_PASSWORD|GRAFANA_USER|APP_ENV)' backend/.env > .env || true

            EXPECTED_SHA=${EXPECTED_SHA:-$(git rev-parse HEAD)}
            echo "🎯 Expected deploy SHA: $EXPECTED_SHA"
            if [ "$EXPECTED_SHA" != "$TRIGGER_SHA" ]; then
              echo "❌ Deployed working tree SHA mismatch"
              echo "   trigger: $TRIGGER_SHA"
              echo "   head:    $EXPECTED_SHA"
              exit 1
            fi

            # 4. Build new images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              build --no-cache backend || { echo "❌ Backend build failed!"; exit 1; }

            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              build --no-cache --build-arg BUILD_SHA="$EXPECTED_SHA" frontend || { echo "❌ Frontend build failed!"; exit 1; }

            # Verify critical packages are installed in the new image
            echo "🔍 Verifying packages in new backend image..."
            docker run --rm aman-backend:latest pip list 2>/dev/null | grep -iE "email.validator|pydantic|alembic|fastapi" || true

            # 5. Start infrastructure (db + redis) first
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d db redis

            # 6. Wait for db to be healthy
            echo "⏳ Waiting for database..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml \
                exec -T db pg_isready -U aman -q 2>/dev/null; then
                echo "✅ Database ready (${i})"
                break
              fi
              echo "  db not ready yet ($i/30)..."
              sleep 3
            done

            # 7. Start backend (detached, don't block on health)
            # Note: entrypoint.sh in the image runs as root, creates /app/uploads/* dirs,
            # chowns them to aman, then drops privileges — no pre-seeding needed.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d backend

            # 8. Wait up to 3 minutes for backend /health to respond
            echo "⏳ Waiting for backend to become healthy..."
            HEALTHY=0
            for i in $(seq 1 36); do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo "000")
              echo "  attempt $i/36 — HTTP $HTTP"
              if [ "$HTTP" = "200" ]; then
                HEALTHY=1
                echo "✅ Backend is healthy!"
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" != "1" ]; then
              echo "❌ Backend failed to become healthy. Logs:"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=100 backend
              docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
              exit 1
            fi

            # 9. Run database migrations
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              exec -T backend alembic upgrade head || echo "⚠️ Alembic skipped"

            # 10. Choose a single frontend serving mode to avoid split-source stale deploys
            FRONTEND_MODE="container_nginx"
            if [ -d /var/www/aman/frontend ] && [ -f /etc/nginx/nginx.conf ]; then
              FRONTEND_MODE="host_nginx"
            fi
            echo "🧭 Frontend serving mode: $FRONTEND_MODE"

            # Always recreate frontend container so latest built assets are active
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --force-recreate frontend

            FRONT_CID=$(docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -q frontend)
            if [ -n "$FRONT_CID" ]; then
              docker exec "$FRONT_CID" sh -lc "printf '%s\\n' '$EXPECTED_SHA' > /usr/share/nginx/html/build-sha.txt"
            fi

            if [ "$FRONTEND_MODE" = "host_nginx" ]; then
              echo "📦 Syncing frontend assets to host root: /var/www/aman/frontend"
              mkdir -p /var/www/aman/frontend

              FRONT_IMG=$(docker compose -f docker-compose.yml -f docker-compose.prod.yml images -q frontend)
              if [ -z "$FRONT_IMG" ]; then
                echo "❌ Could not resolve frontend image ID"
                exit 1
              fi

              TMP_DIR=$(mktemp -d)
              FRONT_TMP=$(docker create "$FRONT_IMG")
              docker cp "$FRONT_TMP:/usr/share/nginx/html/." "$TMP_DIR/"
              docker rm -f "$FRONT_TMP" >/dev/null

              rsync -a --delete "$TMP_DIR/" /var/www/aman/frontend/
              printf '%s\n' "$EXPECTED_SHA" > /var/www/aman/frontend/build-sha.txt
              rm -rf "$TMP_DIR"
              echo "✅ Host frontend root synced"

              if command -v systemctl >/dev/null 2>&1; then
                sudo -n nginx -t && sudo -n systemctl reload nginx || nginx -t && systemctl reload nginx || true
              elif command -v nginx >/dev/null 2>&1; then
                nginx -t && nginx -s reload || true
              fi
            fi

            # 10.05 Wait for frontend endpoint to respond
            echo "⏳ Waiting for frontend to become ready..."
            FRONT_READY=0
            for i in $(seq 1 24); do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1/index.html 2>/dev/null || echo "000")
              echo "  attempt $i/24 — frontend index HTTP $HTTP"
              if [ "$HTTP" = "200" ]; then
                FRONT_READY=1
                echo "✅ Frontend is reachable"
                break
              fi
              sleep 5
            done

            if [ "$FRONT_READY" != "1" ]; then
              echo "❌ Frontend did not become reachable"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=120 frontend || true
              exit 1
            fi

            # 10.1 Verify no-cache headers for index.html (prevents stale UI after deployments)
            echo "🔍 Verifying index.html cache headers..."
            INDEX_HEADERS=$(curl -sI http://127.0.0.1/index.html | tr -d '\r')
            echo "$INDEX_HEADERS" | grep -iE 'cache-control|pragma|expires' || true
            echo "$INDEX_HEADERS" | grep -qi 'cache-control: .*no-store' || {
              echo "❌ Missing no-store cache policy on index.html"
              exit 1
            }

            # 10.2 Verify deployed frontend SHA from the local serving source of truth
            VERIFY_URL="http://127.0.0.1/build-sha.txt"
            echo "🔍 Verifying local served frontend SHA via: $VERIFY_URL"
            SERVED_SHA=$(curl -fsSL "$VERIFY_URL" | tr -d '\r\n[:space:]')
            if ! echo "$SERVED_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "❌ Invalid build-sha response (expected 40-char git SHA)"
              echo "   verify_url: $VERIFY_URL"
              echo "   response:   $SERVED_SHA"
              echo "   hint: ensure /build-sha.txt exists and is not routed to SPA fallback"
              exit 1
            elif [ "$SERVED_SHA" != "$EXPECTED_SHA" ]; then
              echo "❌ Served frontend SHA mismatch"
              echo "   expected: $EXPECTED_SHA"
              echo "   served:   $SERVED_SHA"
              exit 1
            else
              echo "✅ Served frontend SHA matches deployed commit"
            fi

            # 10.25 External-domain check (must match to confirm users get fresh build)
            EXTERNAL_VERIFY_URL="http://${{ secrets.DEPLOY_HOST }}/build-sha.txt"
            EXTERNAL_SHA=""
            echo "⏳ Verifying external domain SHA via: $EXTERNAL_VERIFY_URL"
            for i in $(seq 1 24); do
              EXTERNAL_SHA=$(curl -fsSL "$EXTERNAL_VERIFY_URL" 2>/dev/null | tr -d '\r\n[:space:]' || true)
              if [ "$EXTERNAL_SHA" = "$EXPECTED_SHA" ]; then
                echo "✅ External domain SHA matches deployed commit (attempt $i/24)"
                break
              fi
              echo "  attempt $i/24 — external SHA: ${EXTERNAL_SHA:-<empty>}"
              sleep 5
            done

            if [ "$EXTERNAL_SHA" != "$EXPECTED_SHA" ]; then
              echo "❌ External domain SHA mismatch after wait window"
              echo "   external_url: $EXTERNAL_VERIFY_URL"
              echo "   expected:     $EXPECTED_SHA"
              echo "   got:          ${EXTERNAL_SHA:-<empty>}"
              echo "   hint: external serving path mismatch or cache/proxy layer"
              exit 1
            fi

            # 10.3 Log deployed commit SHA for traceability
            echo "✅ Deployed commit SHA: $EXPECTED_SHA"

            # 10.4 Final explicit verification output
            echo "LOCAL_SHA=$(curl -fsSL http://127.0.0.1/build-sha.txt || true)"
            echo "PUBLIC_SHA=$(curl -fsSL http://${{ secrets.DEPLOY_HOST }}/build-sha.txt || true)"

            # 11. Start remaining services (prometheus, grafana)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --remove-orphans

            # 12. Cleanup
            docker system prune -f --volumes=false
            echo "✅ Deployment complete — $(date)"
