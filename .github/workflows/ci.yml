name: AMAN ERP CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/aman

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  # 1. Backend Tests
  # ══════════════════════════════════════════════════════════════════════════════
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aman_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aman_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Syntax check (all Python files)
        working-directory: backend
        run: |
          python -c "
          import ast, sys, pathlib
          errors = []
          for f in pathlib.Path('.').rglob('*.py'):
              if '__pycache__' in str(f) or '.venv' in str(f):
                  continue
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('❌ Syntax errors:')
              for e in errors: print(f'  {e}')
              sys.exit(1)
          print('✅ All Python files pass syntax check')
          "

      - name: Run Backend Tests
        working-directory: backend
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aman_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aman_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          APP_ENV: testing
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --junitxml=test-results/backend.xml \
            -q 2>&1 | head -200 || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results/

  # ══════════════════════════════════════════════════════════════════════════════
  # 2. Frontend Tests / Build
  # ══════════════════════════════════════════════════════════════════════════════
  frontend-tests:
    name: Frontend Tests (Node)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════════
  # 3. Docker Image Build (only on push to main/develop)
  # ══════════════════════════════════════════════════════════════════════════════
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-22.04
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════════════════
  # 4. Deploy to Production (main branch only)
  #    Strategy: SSH → git pull → docker compose up --build
  # ══════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy to Production (DigitalOcean)
    runs-on: ubuntu-22.04
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Starting deployment — $(date)"
            cd /opt/aman

            # 1. Pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Code updated to: $(git log -1 --oneline)"

            # 2. Write backend .env from GitHub secret
            printf '%s' '${{ secrets.PROD_ENV_FILE }}' > backend/.env
            chmod 600 backend/.env

            # 3. Write root .env for docker compose variable interpolation
            grep -E '^(POSTGRES_PASSWORD|POSTGRES_USER|POSTGRES_DB|REDIS_PASSWORD|GRAFANA_PASSWORD|GRAFANA_USER|APP_ENV)' backend/.env > .env || true

            # 4. Build new images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              build --no-cache backend frontend || { echo "❌ Build failed!"; exit 1; }

            # Verify critical packages are installed in the new image
            echo "🔍 Verifying packages in new backend image..."
            docker run --rm aman-backend:latest pip list 2>/dev/null | grep -iE "email.validator|pydantic|alembic|fastapi" || true

            # 5. Start infrastructure (db + redis) first
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d db redis

            # 6. Wait for db to be healthy
            echo "⏳ Waiting for database..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml \
                exec -T db pg_isready -U aman -q 2>/dev/null; then
                echo "✅ Database ready (${i})"
                break
              fi
              echo "  db not ready yet ($i/30)..."
              sleep 3
            done

            # 7. Fix upload volume permissions before starting backend
            # The named volume may have been created by root; ensure aman user can write
            docker run --rm --user root \
              -v aman_uploads:/app/uploads \
              alpine sh -c "
                mkdir -p /app/uploads/documents /app/uploads/temp /app/uploads/invoices /app/uploads/contracts
                chmod -R 755 /app/uploads
                chown -R 1000:1000 /app/uploads 2>/dev/null || chmod -R 777 /app/uploads
              " 2>/dev/null || echo "⚠️ Volume permission fix skipped (volume may not exist yet)"

            # Start backend (detached, don't block on health)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d backend

            # 8. Wait up to 3 minutes for backend /health to respond
            echo "⏳ Waiting for backend to become healthy..."
            HEALTHY=0
            for i in $(seq 1 36); do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo "000")
              echo "  attempt $i/36 — HTTP $HTTP"
              if [ "$HTTP" = "200" ]; then
                HEALTHY=1
                echo "✅ Backend is healthy!"
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" != "1" ]; then
              echo "❌ Backend failed to become healthy. Logs:"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=100 backend
              docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
              exit 1
            fi

            # 9. Run database migrations
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              exec -T backend alembic upgrade head || echo "⚠️ Alembic skipped"

            # 10. Start remaining services (frontend, prometheus, grafana)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --remove-orphans

            # 11. Cleanup
            docker system prune -f --volumes=false
            echo "✅ Deployment complete — $(date)"
