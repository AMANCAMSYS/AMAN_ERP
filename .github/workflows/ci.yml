name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Backend: fast static gates (no DB required)
  # ─────────────────────────────────────────────────────────────────────
  backend-static:
    name: backend · lint + import-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install system build deps (python-ldap, xmlsec)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libldap2-dev libsasl2-dev libssl-dev \
            libxml2-dev libxmlsec1-dev libxmlsec1-openssl

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Ruff — syntax errors (strict gate)
        working-directory: backend
        run: |
          # E9  = syntax errors (block build)
          # F63 = invalid comparisons (block build)
          # F7  = loop/if/else semantic errors (block build)
          # These are always correctness bugs — no tolerance.
          ruff check --select E9,F63,F7 --output-format=github .

      - name: Ruff — undefined names (advisory, 74 known legacy bugs)
        working-directory: backend
        continue-on-error: true
        run: |
          # F82 (F821/F823 etc) = undefined names. The codebase has 74 pre-existing
          # sites where endpoint bodies reference `data`, `year`, `entry_id` etc.
          # that were removed from function signatures during a refactor. These are
          # tracked as a Phase-2 finding and fixed in a dedicated PR.
          # Keep this check visible but non-blocking until backlog is drained.
          ruff check --select F82 --output-format=github .

      - name: Import smoke test — every router module
        working-directory: backend
        env:
          # Minimum env for import-time settings validation
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_USER: aman
          POSTGRES_PASSWORD: ci_smoke_password
          POSTGRES_DB: postgres
          SECRET_KEY: ci_smoke_secret_key_0123456789abcdef0123456789abcdef
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          python - <<'PY'
          import importlib, pkgutil, sys
          import routers  # package
          failed = []
          for m in pkgutil.walk_packages(routers.__path__, prefix="routers."):
              try:
                  importlib.import_module(m.name)
              except Exception as e:
                  failed.append((m.name, repr(e)))
          if failed:
              print("Failed imports:")
              for name, err in failed:
                  print(f"  {name}: {err}")
              sys.exit(1)
          print(f"OK — {sum(1 for _ in pkgutil.walk_packages(routers.__path__, prefix='routers.'))} router modules imported cleanly")
          PY

  # ─────────────────────────────────────────────────────────────────────
  # Backend: project-specific guards (SQL parameterization, GL discipline)
  # ─────────────────────────────────────────────────────────────────────
  backend-guards:
    name: backend · sql-safety + gl-discipline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: SQL parameterization guard
        run: python scripts/check_sql_parameterization.py

      - name: GL posting discipline guard
        run: python scripts/check_gl_posting_discipline.py

      - name: PII / secret logging guard (SEC-07)
        run: python scripts/check_pii_logging.py

  # ─────────────────────────────────────────────────────────────────────
  # Backend: tenant bootstrap end-to-end (creates a fresh tenant DB)
  # This validates the 301-tables-+-8-MVs invariant on every PR.
  # ─────────────────────────────────────────────────────────────────────
  tenant-bootstrap-e2e:
    name: backend · tenant bootstrap E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aman
          POSTGRES_PASSWORD: ci_pg_password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aman"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      POSTGRES_USER: aman
      POSTGRES_PASSWORD: ci_pg_password
      POSTGRES_DB: postgres
      SECRET_KEY: ci_smoke_secret_key_0123456789abcdef0123456789abcdef
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system build deps (python-ldap, xmlsec)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libldap2-dev libsasl2-dev libssl-dev \
            libxml2-dev libxmlsec1-dev libxmlsec1-openssl

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Create a fresh tenant & assert schema completeness
        working-directory: backend
        run: |
          python - <<'PY'
          import sys, os
          sys.path.insert(0, os.getcwd())
          from database import create_company_database, create_company_tables
          from config import settings
          from sqlalchemy import create_engine, text

          test_id = "citest01"
          ok, msg, db_name, db_user = create_company_database(test_id, "CiTestPass123!")
          assert ok, f"create_company_database failed: {msg}"

          ok, msg = create_company_tables(test_id, currency="SAR")
          assert ok, f"create_company_tables failed: {msg}"

          eng = create_engine(settings.get_company_database_url(test_id))
          with eng.connect() as c:
              tables = c.execute(text(
                  "SELECT count(*) FROM pg_tables WHERE schemaname='public'"
              )).scalar()
              mvs = c.execute(text(
                  "SELECT count(*) FROM pg_matviews WHERE schemaname='public'"
              )).scalar()
              alembic_v = c.execute(text(
                  "SELECT version_num FROM alembic_version LIMIT 1"
              )).scalar()
          eng.dispose()

          print(f"tables={tables}, mvs={mvs}, alembic={alembic_v}")

          # Bootstrap invariants (see /memories/repo/tenant-bootstrap-alembic-note.md).
          # The numbers grow over time — these lower bounds keep the test honest
          # without being brittle to legitimate additions.
          assert tables >= 290, f"Expected >=290 tables in a fresh tenant, got {tables}"
          assert mvs >= 8, f"Expected >=8 materialized views, got {mvs}"
          assert alembic_v, "alembic_version row missing — stamp head failed"
          print("Tenant bootstrap E2E: OK")
          PY

  # ─────────────────────────────────────────────────────────────────────
  # Frontend: build + unit tests
  # ─────────────────────────────────────────────────────────────────────
  frontend:
    name: frontend · build + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Vite build
        working-directory: frontend
        run: npm run build

      - name: Vitest unit tests
        working-directory: frontend
        run: npm test -- --reporter=default

  # ─────────────────────────────────────────────────────────────────────
  # Dependency audit (non-blocking signal)
  # ─────────────────────────────────────────────────────────────────────
  dependency-audit:
    name: audit · pip + npm (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --strict --ignore-vuln GHSA-4xh5-x5gv-qwph || true

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # ─────────────────────────────────────────────────────────────────────
  # CD: auto-deploy to production after all CI jobs pass
  #
  # Required GitHub Secrets (Settings → Secrets → Actions):
  #   DEPLOY_HOST      = 64.225.49.118
  #   DEPLOY_USER      = root
  #   DEPLOY_PASSWORD  = <server root password>
  # ─────────────────────────────────────────────────────────────────────
  deploy:
    name: deploy · amanerp.me
    runs-on: ubuntu-latest
    needs: [backend-static, backend-guards, tenant-bootstrap-e2e, frontend]
    # Only deploy on direct pushes to main — not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH → pull + rebuild + restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          timeout: 600s
          command_timeout: 580s
          script: |
            set -e
            cd /opt/aman

            OLD_COMMIT="$(git rev-parse HEAD)"

            echo "=== 1. Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main
            NEW_COMMIT="$(git rev-parse HEAD)"
            echo "Deployed commit: $(git log --oneline -1)"

            echo "=== 1.1 Detect changed files ==="
            CHANGED_FILES="$(git diff --name-only "$OLD_COMMIT" "$NEW_COMMIT" || true)"
            if [ -z "$CHANGED_FILES" ]; then
              echo "No file changes between $OLD_COMMIT and $NEW_COMMIT"
            fi

            NEED_BACKEND=0
            NEED_FRONTEND=0

            if echo "$CHANGED_FILES" | grep -Eq '^(backend/|alembic/|migrations/|docker-compose\.yml|docker-compose\.prod\.yml|deploy\.sh)'; then
              NEED_BACKEND=1
            fi

            if echo "$CHANGED_FILES" | grep -Eq '^(frontend/|docker-compose\.yml|docker-compose\.prod\.yml)'; then
              NEED_FRONTEND=1
            fi

            if [ "$NEED_BACKEND" = "0" ] && [ "$NEED_FRONTEND" = "0" ]; then
              NEED_BACKEND=1
              NEED_FRONTEND=1
            fi

            echo "Plan: backend=$NEED_BACKEND frontend=$NEED_FRONTEND"

            echo "=== 2. Rebuild Docker images (affected services only) ==="
            BUILD_SERVICES=""
            if [ "$NEED_BACKEND" = "1" ]; then
              BUILD_SERVICES="$BUILD_SERVICES backend worker"
            fi
            if [ "$NEED_FRONTEND" = "1" ]; then
              BUILD_SERVICES="$BUILD_SERVICES frontend"
            fi

            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              build $BUILD_SERVICES

            if [ "$NEED_BACKEND" = "1" ]; then
              echo "=== 3. Restart backend + worker first (keep frontend serving) ==="
              docker compose -f docker-compose.yml -f docker-compose.prod.yml \
                up -d --no-deps backend worker

              echo "=== 4. Health check ==="
              for i in 1 2 3 4 5 6; do
                sleep 10
                if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                  echo "Backend healthy after ${i}0s"
                  break
                fi
                echo "Waiting... attempt $i/6"
                if [ "$i" = "6" ]; then
                  echo "ERROR: backend not healthy after 60s"
                  docker logs --tail 30 aman_backend
                  exit 1
                fi
              done
            else
              echo "=== 3/4. Backend unchanged — skip backend restart ==="
            fi

            if [ "$NEED_FRONTEND" = "1" ]; then
              echo "=== 5. Restart frontend after backend is healthy ==="
              docker compose -f docker-compose.yml -f docker-compose.prod.yml \
                up -d --no-deps frontend

              for i in 1 2 3 4 5 6; do
                sleep 5
                if curl -sf http://localhost/ > /dev/null 2>&1; then
                  echo "Frontend reachable after ${i}x5s"
                  break
                fi
                echo "Waiting frontend... attempt $i/6"
                if [ "$i" = "6" ]; then
                  echo "ERROR: frontend not reachable after 30s"
                  docker logs --tail 40 aman_frontend || true
                  exit 1
                fi
              done
            else
              echo "=== 5. Frontend unchanged — skip frontend restart ==="
            fi

            curl -sf http://localhost:8000/health
            echo ""
            echo "Deploy complete: $(git log --oneline -1)"
